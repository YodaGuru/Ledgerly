name: Bug report
description: Report a reproducible Ledgerly problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Ledgerly. Do not include passwords, financial records, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: Ledgerly version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: macOS 26.0, MacBook Air M3
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or logs after removing sensitive information.
